# 뉴스 검색 키워드 (Google News RSS)
news_queries:
  - { q: "미국 증시 마감",            lang: "ko" }
  - { q: "코스피 삼성전자 SK하이닉스", lang: "ko" }
  - { q: "Nvidia stock",             lang: "en" }
  - { q: "Oracle stock",             lang: "en" }
  - { q: "Tesla stock",              lang: "en" }
  - { q: "OpenAI OR Anthropic OR xAI funding IPO", lang: "en" }
  - { q: "원달러 환율",               lang: "ko" }

news_per_query: 5   # 쿼리당 헤드라인 수

llm:
  # provider: 사용할 엔진 우선순위. "gemini"면 GEMINI_API_KEY(무료 티어)를 먼저 사용.
  #           "anthropic"이면 ANTHROPIC_API_KEY(유료, Claude MAX 구독과 무관한 별도 결제)를 먼저 사용.
  #           키가 없으면 다른 엔진으로 폴백, 둘 다 없으면 데이터만으로 기본 브리핑.
  provider: "gemini"
  gemini_model: "gemini-2.5-flash"
  # Gemini 추론(thinking) 토큰 예산. >0이면 분석 깊이↑(무료). thinking 토큰도 출력 한도를
  # 소비하므로 max_output_tokens보다 충분히 작게. 0=추론 끔(기존 동작). -1=동적(모델 자동).
  gemini_thinking_budget: 4096
  anthropic_model: "claude-opus-4-8"   # provider를 "anthropic"으로 바꾸면 사용(유료, 월 ~$3~4)
  max_output_tokens: 16000

site:
  title: "📈 아침 시장 브리핑"
  description: "미국·한국 증시 일일 맞춤 브리핑"
