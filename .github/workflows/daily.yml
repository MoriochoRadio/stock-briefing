name: Daily Stock Briefing

on:
  schedule:
    # 22:10 UTC 월~금 = 화~토 07:10 KST — 직전 밤 미국장 세션이 있는 날만.
    # (일·월 아침은 미국 휴장으로 금요일 데이터를 '밤사이'처럼 쓰게 되어 제외)
    # 정각(0분)은 GitHub cron 혼잡 시간대라 회피. intraday의 22시대 발화와도 겹치지 않게
    # 어긋난 분을 쓴다(같은 concurrency 그룹 'pages'에서 pending인 daily가 intraday에
    # 밀려 취소되면 그날 아침 브리핑이 통째로 빠지기 때문).
    - cron: "10 22 * * 1-5"
  workflow_dispatch:        # 수동 실행 버튼
  push:                     # main에 코드 push 시 사이트 재배포 (데이터 수집은 건너뜀)
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        if: github.event_name != 'push'
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        if: github.event_name != 'push'
        run: pip install -r requirements.txt

      - name: Fetch market data
        if: github.event_name != 'push'
        run: python scripts/fetch_data.py

      - name: Generate briefing
        if: github.event_name != 'push'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate.py

      - name: Commit briefing & history
        if: github.event_name != 'push'
        run: |
          git config user.name "briefing-bot"
          git config user.email "actions@github.com"
          git add briefings site/src/data/history.json site/src/data/series.json site/src/data/sentiment.json site/src/data/news.json
          git diff --cached --quiet || git commit -m "briefing: $(date -u -d '+9 hours' +'%Y-%m-%d')"
          # 원격에 다른 커밋(봇/다른 워크플로)이 있을 수 있으니 rebase 후 push.
          # 동시 실행 경쟁으로 push가 거부될 수 있어 재시도. 5회 전부 실패하면
          # 스텝을 실패시켜 알림이 오게 한다(예전엔 마지막 sleep의 exit 0으로
          # 조용히 통과해 커밋 유실이 무증상이었음).
          ok=""
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && { ok=1; break; }
            echo "push 충돌/실패 — 재시도 $i/5"; sleep 6
          done
          [ -n "$ok" ] || { echo "push 최종 실패 — 브리핑 커밋 유실 위험"; exit 1; }

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Build Astro site
        env:
          BASE_PATH: "/${{ github.event.repository.name }}"
          SITE_URL: "https://${{ github.repository_owner }}.github.io"
        run: |
          cd site
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        continue-on-error: true # Pages 일시 장애("try again later")는 1회 재시도로 흡수

      - name: 배포 재시도 대기
        if: steps.deploy.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (재시도)
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
