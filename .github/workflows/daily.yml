name: Daily Stock Briefing

on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC = 한국시간 오전 7시
  workflow_dispatch:        # 수동 실행 버튼
  push:                     # main에 코드 push 시 사이트 재배포 (데이터 수집은 건너뜀)
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        if: github.event_name != 'push'
        with:
          python-version: "3.12"

      - name: Install Python deps
        if: github.event_name != 'push'
        run: pip install -r requirements.txt

      - name: Fetch market data
        if: github.event_name != 'push'
        run: python scripts/fetch_data.py

      - name: Generate briefing
        if: github.event_name != 'push'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate.py

      - name: Commit briefing & history
        if: github.event_name != 'push'
        run: |
          git config user.name "briefing-bot"
          git config user.email "actions@github.com"
          git add briefings site/src/data/history.json site/src/data/series.json site/src/data/sentiment.json site/src/data/news.json
          git diff --cached --quiet || git commit -m "briefing: $(date -u -d '+9 hours' +'%Y-%m-%d')"
          # 원격에 다른 커밋(봇/다른 워크플로)이 있을 수 있으니 rebase 후 push.
          # 동시 실행 경쟁으로 push가 거부될 수 있어 재시도(silent 데이터 손실 방지).
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "push 충돌/실패 — 재시도 $i/5"; sleep 6
          done

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Build Astro site
        env:
          BASE_PATH: "/${{ github.event.repository.name }}"
          SITE_URL: "https://${{ github.repository_owner }}.github.io"
        run: |
          cd site
          npm install
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
